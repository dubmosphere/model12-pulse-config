# TASCAM Model 12 — native PipeWire loopback nodes
#
# Creates per-channel virtual sources and a virtual stereo sink using
# libpipewire-module-loopback. Native PipeWire — no PA compat layer.
#
# PipeWire 0.3.48 / WirePlumber 0.4.8 compatible:
#   - target.object  → node.target  (renamed in 0.3.52+)
#   - stream.dont-remix removed     (added in 0.3.56+, causes crash in 0.3.48)
#   - node.passive removed          (not supported in loopback streams in 0.3.48)
#   - audio.position on playback side drives channel selection (PW remaps by position)
#
# ALSA 12ch capture channel order (from tascam-model12.conf):
#   FL   FR   RL   RR   FC   LFE   SL   SR   AUX0  AUX1  AUX2  AUX3
#   Ch1  Ch2  Ch3  Ch4  Ch5  Ch6  Ch7   Ch8  Ch9   Ch10  MainL MainR
#
# Install to: ~/.config/pipewire/pipewire.conf.d/10-tascam-model12-loopbacks.conf
# (install-pipewire.sh does this automatically)

context.modules = [

  # ── Ch1 Mono (front-left) ─────────────────────────────────────────────────
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Model12-capture_1"
      capture.props = {
        node.name        = "capture_1"
        node.description = "Model12-capture_1"
        media.class      = "Audio/Source"
        audio.channels   = 1
        audio.position   = [ MONO ]
      }
      playback.props = {
        media.class      = "Audio/Sink"
        audio.channels   = 1
        audio.position   = [ FL ]
        node.target      = "alsa_input.usb-TASCAM_Model_12_no_serial_number-00.analog-multichannel-input"
      }
    }
  }

  # ── Ch2 Mono (front-right) ────────────────────────────────────────────────
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Model12-capture_2"
      capture.props = {
        node.name           = "capture_2"
        node.description    = "Model12-capture_2"
        media.class         = "Audio/Source"
        audio.channels      = 1
        audio.position      = [ MONO ]
        priority.session    = 2000
      }
      playback.props = {
        media.class      = "Audio/Sink"
        audio.channels   = 1
        audio.position   = [ FR ]
        node.target      = "alsa_input.usb-TASCAM_Model_12_no_serial_number-00.analog-multichannel-input"
      }
    }
  }

  # ── Ch3 Mono (rear-left) ──────────────────────────────────────────────────
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Model12-capture_3"
      capture.props = {
        node.name        = "capture_3"
        node.description = "Model12-capture_3"
        media.class      = "Audio/Source"
        audio.channels   = 1
        audio.position   = [ MONO ]
      }
      playback.props = {
        media.class      = "Audio/Sink"
        audio.channels   = 1
        audio.position   = [ RL ]
        node.target      = "alsa_input.usb-TASCAM_Model_12_no_serial_number-00.analog-multichannel-input"
      }
    }
  }

  # ── Ch4 Mono (rear-right) ─────────────────────────────────────────────────
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Model12-capture_4"
      capture.props = {
        node.name        = "capture_4"
        node.description = "Model12-capture_4"
        media.class      = "Audio/Source"
        audio.channels   = 1
        audio.position   = [ MONO ]
      }
      playback.props = {
        media.class      = "Audio/Sink"
        audio.channels   = 1
        audio.position   = [ RR ]
        node.target      = "alsa_input.usb-TASCAM_Model_12_no_serial_number-00.analog-multichannel-input"
      }
    }
  }

  # ── Ch5 Mono (front-center) ───────────────────────────────────────────────
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Model12-capture_5"
      capture.props = {
        node.name        = "capture_5"
        node.description = "Model12-capture_5"
        media.class      = "Audio/Source"
        audio.channels   = 1
        audio.position   = [ MONO ]
      }
      playback.props = {
        media.class      = "Audio/Sink"
        audio.channels   = 1
        audio.position   = [ FC ]
        node.target      = "alsa_input.usb-TASCAM_Model_12_no_serial_number-00.analog-multichannel-input"
      }
    }
  }

  # ── Ch6 Mono (lfe) ────────────────────────────────────────────────────────
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Model12-capture_6"
      capture.props = {
        node.name        = "capture_6"
        node.description = "Model12-capture_6"
        media.class      = "Audio/Source"
        audio.channels   = 1
        audio.position   = [ MONO ]
      }
      playback.props = {
        media.class      = "Audio/Sink"
        audio.channels   = 1
        audio.position   = [ LFE ]
        node.target      = "alsa_input.usb-TASCAM_Model_12_no_serial_number-00.analog-multichannel-input"
      }
    }
  }

  # ── Ch7/8 Stereo (side-left + side-right) ─────────────────────────────────
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Model12-capture_7_8"
      capture.props = {
        node.name        = "capture_7_8"
        node.description = "Model12-capture_7_8"
        media.class      = "Audio/Source"
        audio.channels   = 2
        audio.position   = [ FL FR ]
      }
      playback.props = {
        media.class      = "Audio/Sink"
        audio.channels   = 2
        audio.position   = [ SL SR ]
        node.target      = "alsa_input.usb-TASCAM_Model_12_no_serial_number-00.analog-multichannel-input"
      }
    }
  }

  # ── Ch9/10 Stereo (aux0 + aux1) ───────────────────────────────────────────
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Model12-capture_9_10"
      capture.props = {
        node.name        = "capture_9_10"
        node.description = "Model12-capture_9_10"
        media.class      = "Audio/Source"
        audio.channels   = 2
        audio.position   = [ FL FR ]
      }
      playback.props = {
        media.class      = "Audio/Sink"
        audio.channels   = 2
        audio.position   = [ AUX0 AUX1 ]
        node.target      = "alsa_input.usb-TASCAM_Model_12_no_serial_number-00.analog-multichannel-input"
      }
    }
  }

  # ── Main L/R Stereo (aux2 + aux3) ─────────────────────────────────────────
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Model12-capture_11_12"
      capture.props = {
        node.name        = "capture_11_12"
        node.description = "Model12-capture_11_12"
        media.class      = "Audio/Source"
        audio.channels   = 2
        audio.position   = [ FL FR ]
      }
      playback.props = {
        media.class      = "Audio/Sink"
        audio.channels   = 2
        audio.position   = [ AUX2 AUX3 ]
        node.target      = "alsa_input.usb-TASCAM_Model_12_no_serial_number-00.analog-multichannel-input"
      }
    }
  }

  # ── Virtual Stereo Output (USB Return 1/2) ────────────────────────────────
  # capture.props = Audio/Sink — apps play to this node
  # playback.props routes to the ALSA hardware output
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Model12-Stereo-Output"
      capture.props = {
        node.name        = "playback_1_2"
        node.description = "Model12-Stereo-Output"
        media.class      = "Audio/Sink"
        audio.channels   = 2
        audio.position   = [ FL FR ]
        priority.session = 2000
      }
      playback.props = {
        audio.channels   = 2
        audio.position   = [ FL FR ]
        node.target      = "alsa_output.usb-TASCAM_Model_12_no_serial_number-00.analog-stereo-output-12"
      }
    }
  }

]
